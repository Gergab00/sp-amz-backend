name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          HUSKY: 0

      - name: Unit tests
        # --passWithNoTests permite que PRs que no tocan specs no fallen en CI;
        # se eliminará cuando todos los módulos tengan cobertura completa.
        run: pnpm run test -- --passWithNoTests

      - name: E2E tests
        # --passWithNoTests aplica igualmente hasta que existan e2e specs.
        run: pnpm run test:e2e -- --passWithNoTests
        env:
          NODE_ENV: test
